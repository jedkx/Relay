# App: one image, two binaries. Postgres for local dev / DBeaver. Tests: golang image (profile `test`).
services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: relay:latest
    container_name: relay
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://relay:relay@postgres:5432/relay_dev?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/app/relay"]

  relay-mock:
    image: relay:latest
    container_name: relay-mock
    ports:
      - "8081:8081"
    command: ["/app/relay-mock"]

  postgres:
    image: postgres:16-alpine
    container_name: relay-postgres
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay_dev
    ports:
      - "5432:5432"
    volumes:
      - relay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  test:
    image: golang:1.22-alpine
    working_dir: /src
    volumes:
      - .:/src
    command: ["go", "test", "./...", "-count=1"]
    profiles:
      - test

volumes:
  relay_pgdata:
